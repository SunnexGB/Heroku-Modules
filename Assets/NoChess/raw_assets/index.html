<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>NoChess</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1a1a2e;color:#eee;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;height:100%}
main{max-width:560px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-size:24px;margin:16px 0}
.board{display:grid;grid-template-columns:repeat(8,1fr);width:100%;aspect-ratio:1;border:2px solid #333;border-radius:4px;overflow:hidden;background:#1a1a2e}
.sq{display:flex;align-items:center;justify-content:center;cursor:default;user-select:none;position:relative;transition:background-color .15s}
.sq.piece-pointer{cursor:pointer}
.sq span.piece{line-height:1}
.dot{position:absolute;width:30%;height:30%;border-radius:50%;pointer-events:none}
.dot.empty{background:rgba(0,0,0,.2)}
.dot.capture{border:3px solid rgba(0,0,0,.3)}
.turn-badge{padding:4px 12px;border-radius:12px;font-size:13px;font-weight:600}
.btns{margin-top:8px;display:flex;gap:8px;justify-content:center}
.btns button{padding:6px 16px;background:#333;border:1px solid #555;border-radius:6px;color:#eee;cursor:pointer;font-size:14px}
.moves-box{margin-top:12px;padding:8px;background:#222;border-radius:6px;max-height:200px;overflow-y:auto;width:100%}
.moves-box .label{font-size:12px;color:#888;margin-bottom:4px}
.moves-box .moves{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:13px;font-family:monospace}
.moves-box .moves .num{color:#666}
.footer{font-size:11px;color:#555;text-align:center;margin-top:8px}
.header-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 0;font-size:14px;color:#aaa}
</style>
</head>
<body>
<main id="root">
<h1>NoChess</h1>
<div id="loader">Connecting...</div>
<div id="app" style="display:none;width:100%">
<div class="header-bar">
<span id="black-name">Black</span>
<span id="turn-badge" class="turn-badge">White</span>
<span id="white-name">White</span>
</div>
<div class="board" id="board"></div>
<div class="btns">
<button id="btn-flip">Flip</button>
<button id="btn-reset">Reconnect</button>
</div>
<div class="moves-box" id="moves-box" style="display:none">
<div class="label">Moves</div>
<div class="moves" id="moves-list"></div>
</div>
<div class="footer" id="footer"></div>
</div>
</main>
<script>
(function(){
var PIECE_MAP={k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟',K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'}
var FILES=['a','b','c','d','e','f','g','h']
var RANKS=['8','7','6','5','4','3','2','1']
var DARK='#7699AF'
var LIGHT='#D8E3E7'
var SEL='#FFDF5A'
var MFROM='#58B4FF'
var MTO='#87CEFA'

var gameId=(new URLSearchParams(location.search)).get('game')
var ws=null
var reconnectTimer=null
var game=null
var board=fenToBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1')
var selected=null
var legalMoves=[]
var moveFrom=null
var moveTo=null
var flipped=false
var wsReady=false

function fenToBoard(fen){
var pos=fen.split(' ')[0]
var rows=pos.split('/')
var b=[]
for(var r=0;r<8;r++){b[r]=[];var c=0;for(var i=0;i<rows[r].length;i++){var ch=rows[r][i];if(ch>='1'&&ch<='8'){for(var j=0;j<parseInt(ch);j++)b[r][c+j]=null;c+=parseInt(ch)}else{b[r][c]=ch;c++}}}
return b
}

function sqToAlg(row,col){return FILES[col]+RANKS[row]}
function algToSq(a){return[RANKS.indexOf(a[1]),FILES.indexOf(a[0])]}

function renderBoard(){
var el=document.getElementById('board')
el.innerHTML=''
for(var r=0;r<8;r++){
for(var c=0;c<8;c++){
var dr=flipped?7-r:r
var dc=flipped?7-c:c
var piece=board[dr]?board[dr][dc]:null
var sq=document.createElement('div')
sq.className='sq'
if(piece)sq.className+=' piece-pointer'
var dark=(dr+dc)%2===1
var bg=dark?DARK:LIGHT
if(selected&&selected[0]===dr&&selected[1]===dc)bg=SEL
else if(moveFrom&&moveFrom[0]===dr&&moveFrom[1]===dc)bg=MFROM
else if(moveTo&&moveTo[0]===dr&&moveTo[1]===dc)bg=MTO
sq.style.backgroundColor=bg
sq.dataset.row=dr
sq.dataset.col=dc
sq.addEventListener('click',function(){handleClick(dr,dc)})
if(piece){
var sp=document.createElement('span')
sp.className='piece'
sp.textContent=PIECE_MAP[piece]
sp.style.fontSize='clamp(16px,8vw,64px)'
sp.style.color=piece===piece.toUpperCase()?'#fff':'#000'
sp.style.textShadow=piece===piece.toUpperCase()?'0 1px 3px rgba(0,0,0,.5)':'0 1px 3px rgba(255,255,255,.5)'
sq.appendChild(sp)
}
var alg=sqToAlg(dr,dc)
var isDest=legalMoves.some(function(m){return m.endsWith(alg)})
if(isDest){
var dot=document.createElement('span')
dot.className='dot'
if(piece)dot.className+=' capture'
else dot.className+=' empty'
sq.appendChild(dot)
}
el.appendChild(sq)
}
}
}

function handleClick(row,col){
if(!game||game.status==='finished'||!wsReady)return
var alg=sqToAlg(row,col)
if(selected&&selected[0]===row&&selected[1]===col){selected=null;legalMoves=[];renderBoard();return}
if(selected){
var matching=legalMoves.filter(function(m){return m.endsWith(alg)})
if(matching.length>0){
var uci=selected[2]+matching[0].slice(2)
ws.send(JSON.stringify({type:'move',uci:uci}))
selected=null;legalMoves=[]
return
}
var piece=board[row][col]
if(piece&&game.turn===(piece===piece.toUpperCase()?'w':'b')){
selected=[row,col,alg]
fetchLegal(alg)
return
}
selected=null;legalMoves=[];renderBoard()
return
}
var piece=board[row][col]
if(!piece)return
if(game.turn!==(piece===piece.toUpperCase()?'w':'b'))return
selected=[row,col,alg]
fetchLegal(alg)
}

function fetchLegal(alg){
fetch('/api/game/'+gameId+'/legal?square='+alg).then(function(r){return r.json()}).then(function(d){legalMoves=d.moves||[];renderBoard()}).catch(function(){legalMoves=[];renderBoard()})
}

function updateUI(){
if(!game)return
document.getElementById('white-name').textContent='♔ '+(game.white||'White')
document.getElementById('black-name').textContent='♚ '+(game.black||'Black')
var badge=document.getElementById('turn-badge')
if(game.status==='finished'){
var txt=''
if(game.result==='1-0')txt='White wins'
else if(game.result==='0-1')txt='Black wins'
else txt='Draw'
badge.textContent=txt
badge.style.background='#333';badge.style.color='#888'
}else{
badge.textContent=game.turn==='w'?'White':'Black'
badge.style.background=game.turn==='w'?'#eee':'#333'
badge.style.color=game.turn==='w'?'#000':'#eee'
}
if(game.moves&&game.moves.length>0){
var mm=document.getElementById('moves-box');mm.style.display='block'
var ml=document.getElementById('moves-list');ml.innerHTML=''
for(var i=0;i<game.moves.length;i++){
var s=document.createElement('span')
if(i%2===0){var n=document.createElement('span');n.className='num';n.textContent=Math.floor(i/2+1)+'. ';s.appendChild(n)}
s.appendChild(document.createTextNode(game.moves[i]))
ml.appendChild(s)
}
}
document.getElementById('footer').textContent=gameId?gameId.slice(0,12)+'... · NoChess v1':'NoChess v1'
}

function onMessage(ev){
try{var data=JSON.parse(ev.data)}catch(_){return}
if(data.type==='game_state'&&data.game){
game=data.game
board=fenToBoard(game.fen)
if(game.moves&&game.moves.length>0){var last=game.moves[game.moves.length-1];var a=algToSq(last.slice(0,2));var b=algToSq(last.slice(2,4));moveFrom=a;moveTo=b}
else{moveFrom=null;moveTo=null}
selected=null;legalMoves=[]
renderBoard();updateUI()
}
}

function connect(){
if(!gameId)return
if(ws){try{ws.close()}catch(_){}}
var proto=location.protocol==='https:'?'wss:':'ws:'
ws=new WebSocket(proto+'//'+location.host+'/ws/'+gameId)
ws.onopen=function(){wsReady=true;document.getElementById('loader').style.display='none';document.getElementById('app').style.display='';renderBoard()}
ws.onclose=function(){wsReady=false;clearTimeout(reconnectTimer);reconnectTimer=setTimeout(connect,2000)}
ws.onmessage=onMessage
ws.onerror=function(){ws.close()}
}

document.getElementById('btn-flip').addEventListener('click',function(){flipped=!flipped;renderBoard()})
document.getElementById('btn-reset').addEventListener('click',function(){connect()})

connect()
})()
</script>
</body>
</html>
